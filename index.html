<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI, sans-serif;
  color:white;
  min-height:100vh;
  overflow-x:hidden;
  background: linear-gradient(135deg,#1a0f3a,#3b1d73,#4c1d95);
  background-size:300% 300%;
  animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 0%;}
  50%{background-position:100% 100%;}
  100%{background-position:0% 0%;}
}

header{
  display:flex;
  justify-content:flex-start;
  align-items:center;
  padding:20px;
  background:rgba(15,10,40,0.6);
  backdrop-filter:blur(14px);
}

.logo{
  font-weight:bold;
  font-size:18px;
}

.hero{
  text-align:center;
  margin-top:80px;
  padding:0 20px;
}

.hero h1{
  font-size:34px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:#cbd5e1;
  margin-bottom:40px;
}

.main-btn{
  display:block;
  margin:0 auto;
  padding:14px 24px;
  border-radius:16px;
  background:linear-gradient(90deg,#3b82f6,#8b5cf6);
  color:white;
  text-decoration:none;
  font-weight:bold;
  max-width:260px;
}

.hero-links{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:15px;
  align-items:center;
}

.hero-links a{
  padding:12px 20px;
  border-radius:14px;
  text-decoration:none;
  color:#cbd5e1;
  background:rgba(30,41,59,0.4);
  width:100%;
  max-width:260px;
  text-align:center;
}

</style>
</head>

<body>

<header>
  <div class="logo">🚀 CryptoStart AI</div>
</header>

<div class="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>

  <a href="education.html" class="main-btn">
    Начать обучение
  </a>

  <div class="hero-links">
    <a href="rates.html">Курсы</a>
    <a href="ai.html">AI</a>
    <a href="about.html">О проекте</a>
  </div>
</div>

</body>
</html>
