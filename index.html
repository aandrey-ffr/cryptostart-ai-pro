<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>

/* ===== СБРОС ===== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI, sans-serif;
  color:white;
  overflow:hidden;
  min-height:100vh;

  /* Чистый градиент без полос */
  background: linear-gradient(135deg, #0b1120 0%, #1e1b4b 50%, #312e81 100%);
}

/* ===== NAV ===== */

nav{
  padding:20px 40px;
  background:rgba(10,15,30,0.8);
  backdrop-filter:blur(10px);
  font-weight:bold;
  position:relative;
  z-index:10;
}

/* ===== HERO ===== */

.hero{
  text-align:center;
  margin-top:120px;
  position:relative;
  z-index:10;
}

.hero h1{
  font-size:54px;
  font-weight:800;
  background:linear-gradient(90deg,#60a5fa,#a78bfa,#8b5cf6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 30px rgba(139,92,246,0.5);
}

.hero p{
  margin:20px 0 40px;
  color:#94a3b8;
}

/* ===== КНОПКА ===== */

.main-btn{
  display:inline-block;
  padding:16px 45px;
  border-radius:14px;
  background:linear-gradient(90deg,#6366f1,#8b5cf6);
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.main-btn:hover{
  transform:translateY(-5px);
  box-shadow:0 0 40px rgba(139,92,246,0.8);
}

/* ===== МОНЕТЫ ===== */

.coin{
  position:absolute;
  width:80px;
  opacity:0.25;
  animation: floatUp linear infinite;
  z-index:1;
}

/* разные позиции и скорости */
.coin:nth-child(1){ left:10%; animation-duration:18s; }
.coin:nth-child(2){ left:30%; animation-duration:22s; }
.coin:nth-child(3){ left:55%; animation-duration:20s; }
.coin:nth-child(4){ left:75%; animation-duration:25s; }

@keyframes floatUp{
  0%{
    transform:translateY(120vh) rotate(0deg);
  }
  100%{
    transform:translateY(-20vh) rotate(360deg);
  }
}

/* ===== МОБИЛКА ===== */

@media(max-width:768px){
  body{ overflow:auto; }
  .hero{ margin-top:80px; padding:0 20px; }
  .hero h1{ font-size:32px; }
  .coin{ width:50px; }
}

</style>
</head>
<body>

<nav>
  🚀 CryptoStart AI
</nav>

<div class="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>

  <a href="education.html" class="main-btn">
    Начать обучение
  </a>
</div>

<!-- Монеты (внизу body, чтобы не ломали слои) -->
<img class="coin" src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=029">
<img class="coin" src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=029">
<img class="coin" src="https://cryptologos.cc/logos/binance-coin-bnb-logo.svg?v=029">
<img class="coin" src="https://cryptologos.cc/logos/solana-sol-logo.svg?v=029">

</body>
</html>
