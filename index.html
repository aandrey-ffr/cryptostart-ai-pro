<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>

/* ===== БАЗА ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  overflow:hidden;
  background:linear-gradient(135deg,#0b1120,#1e1b4b,#0f172a);
}

/* ===== ГЛУБИНА (BLUR-СЛОИ) ===== */

.blur-layer{
  position:absolute;
  width:600px;
  height:600px;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.3;
  z-index:0;
}

.blur1{
  background:#7c3aed;
  top:-150px;
  left:-150px;
}

.blur2{
  background:#2563eb;
  bottom:-200px;
  right:-150px;
}

/* ===== NAV ===== */

nav{
  padding:20px 40px;
  background:rgba(10,15,30,0.6);
  backdrop-filter:blur(15px);
  position:relative;
  z-index:10;
}

/* ===== HERO ===== */

.hero{
  text-align:center;
  margin-top:120px;
  position:relative;
  z-index:5;
  transition:transform 0.2s ease;
}

.hero h1{
  font-size:56px;
  font-weight:800;
  background:linear-gradient(90deg,#60a5fa,#a78bfa,#8b5cf6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 25px rgba(139,92,246,0.4);
}

.hero p{
  color:#94a3b8;
  margin:20px 0 40px;
}

.main-btn{
  display:inline-block;
  padding:16px 45px;
  border-radius:14px;
  background:linear-gradient(90deg,#6366f1,#8b5cf6);
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.main-btn:hover{
  transform:translateY(-4px);
  box-shadow:0 0 35px rgba(139,92,246,0.7);
}

/* ===== ДИНАМИЧЕСКИЙ РЫНОК ===== */

.market-line{
  position:absolute;
  width:200%;
  height:2px;
  background:linear-gradient(90deg,transparent,#22c55e,transparent);
  opacity:0.15;
  animation:moveLine 12s linear infinite;
}

.line1{ top:60%; animation-duration:15s; }
.line2{ top:70%; animation-duration:18s; }

@keyframes moveLine{
  0%{ transform:translateX(-50%) translateY(0); }
  50%{ transform:translateX(0%) translateY(-20px); }
  100%{ transform:translateX(50%) translateY(0); }
}

/* ===== МОНЕТЫ (УЛЕТАЮТ ВВЕРХ) ===== */

.coin{
  position:absolute;
  width:80px;
  height:80px;
  opacity:0.18;
  animation:rise linear infinite;
  filter:drop-shadow(0 0 20px rgba(139,92,246,0.5));
}

.c1{ left:10%; animation-duration:18s; }
.c2{ left:30%; animation-duration:22s; }
.c3{ left:55%; animation-duration:20s; }
.c4{ left:75%; animation-duration:25s; }

@keyframes rise{
  0%{
    transform:translateY(120vh) rotate(0deg);
  }
  100%{
    transform:translateY(-30vh) rotate(360deg);
  }
}

/* ===== МОБИЛКА ===== */

@media (max-width:768px){

  body{overflow:auto;}

  .hero{margin-top:80px;padding:0 20px;}

  .hero h1{font-size:32px;}

  .coin{
    width:50px;
    height:50px;
  }

}

</style>
</head>
<body>

<div class="blur-layer blur1"></div>
<div class="blur-layer blur2"></div>

<nav>
  🚀 CryptoStart AI
</nav>

<div class="hero" id="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>

  <a href="education.html" class="main-btn">
    Начать обучение
  </a>
</div>

<!-- ДИНАМИЧЕСКИЙ ФОН -->
<div class="market-line line1"></div>
<div class="market-line line2"></div>

<!-- МОНЕТЫ -->
<img class="coin c1" src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=029">
<img class="coin c2" src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=029">
<img class="coin c3" src="https://cryptologos.cc/logos/binance-coin-bnb-logo.svg?v=029">
<img class="coin c4" src="https://cryptologos.cc/logos/solana-sol-logo.svg?v=029">

<script>

/* ===== ЛЁГКИЙ 3D ЭФФЕКТ ===== */

const hero = document.getElementById("hero");

document.addEventListener("mousemove", (e)=>{
  const x = (window.innerWidth/2 - e.clientX)/40;
  const y = (window.innerHeight/2 - e.clientY)/40;
  hero.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
