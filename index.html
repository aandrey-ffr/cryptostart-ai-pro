<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>

/* ===== ФОН PREMIUM ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  overflow:hidden;

  background:
  radial-gradient(circle at 20% 30%, #312e81 0%, transparent 40%),
  radial-gradient(circle at 80% 70%, #1e1b4b 0%, transparent 40%),
  linear-gradient(135deg,#0f172a,#0b1120,#0f172a);

  background-size:200% 200%;
  animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== NAVBAR ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(15px);
  position:relative;
  z-index:10;
  font-weight:bold;
  letter-spacing:1px;
}

/* ===== HERO ===== */

.hero{
  text-align:center;
  margin-top:120px;
  position:relative;
  z-index:5;
}

.hero h1{
  font-size:56px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:#94a3b8;
  margin-bottom:60px;
  font-size:18px;
}

/* ===== КНОПКИ ===== */

.hero-links{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.hero-links a{
  padding:16px 32px;
  border-radius:16px;
  text-decoration:none;
  color:#e2e8f0;
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}

.hero-links a:hover{
  transform:translateY(-6px);
  border:1px solid #8b5cf6;
  box-shadow:0 0 35px rgba(139,92,246,0.7);
  color:white;
}

/* ===== МОНЕТЫ ===== */

.coin{
  position:absolute;
  width:70px;
  height:70px;
  opacity:0.12;
  animation:float linear infinite;
  transition:transform 0.3s ease;
  filter:drop-shadow(0 0 20px rgba(139,92,246,0.4));
}

.c1{ left:5%; animation-duration:18s; }
.c2{ left:20%; animation-duration:24s; }
.c3{ left:35%; animation-duration:20s; }
.c4{ left:55%; animation-duration:28s; }
.c5{ left:75%; animation-duration:22s; }
.c6{ left:90%; animation-duration:30s; }

@keyframes float{
  0%{ transform:translateY(110vh) rotate(0deg);}
  100%{ transform:translateY(-20vh) rotate(360deg);}
}

/* ===== МОБИЛКА ===== */

@media (max-width:768px){

  body{overflow:auto;}

  .hero{margin-top:80px;padding:0 20px;}

  .hero h1{font-size:34px;}

  .hero-links a{
    width:100%;
    max-width:280px;
    text-align:center;
  }

  .coin{
    width:45px;
    height:45px;
  }
}

</style>
</head>
<body>

<nav>
  🚀 CryptoStart AI
</nav>

<div class="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>

  <div class="hero-links">
    <a href="education.html">📚 Обучение</a>
    <a href="rates.html">💰 Курсы</a>
    <a href="ai.html">🤖 AI</a>
    <a href="about.html">🌍 О проекте</a>
  </div>
</div>

<!-- SVG монеты -->
<img class="coin c1" src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=029">
<img class="coin c2" src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=029">
<img class="coin c3" src="https://cryptologos.cc/logos/solana-sol-logo.svg?v=029">
<img class="coin c4" src="https://cryptologos.cc/logos/binance-coin-bnb-logo.svg?v=029">
<img class="coin c5" src="https://cryptologos.cc/logos/cardano-ada-logo.svg?v=029">
<img class="coin c6" src="https://cryptologos.cc/logos/xrp-xrp-logo.svg?v=029">

<script>
/* ===== ПАРАЛЛАКС ЭФФЕКТ ===== */

document.addEventListener("mousemove", (e) => {
  const coins = document.querySelectorAll(".coin");
  const x = (window.innerWidth / 2 - e.clientX) / 40;
  const y = (window.innerHeight / 2 - e.clientY) / 40;

  coins.forEach((coin) => {
    coin.style.transform += ` translate(${x}px, ${y}px)`;
  });
});
</script>

</body>
</html>
