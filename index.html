<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI, sans-serif;
  color:white;
  overflow:hidden;
  min-height:100vh;

  background: linear-gradient(135deg,#0b1120,#1e1b4b,#312e81);
  background-size:300% 300%;
  animation:bgMove 20s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 0%;}
  50%{background-position:100% 100%;}
  100%{background-position:0% 0%;}
}

/* NAV */
nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.75);
  backdrop-filter:blur(12px);
  position:relative;
  z-index:10;
  font-weight:bold;
}

/* HERO */
.hero{
  height:calc(100vh - 80px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  z-index:10;
}

.hero h1{
  font-size:56px;
  font-weight:800;
  margin-bottom:20px;
  background:linear-gradient(90deg,#60a5fa,#a78bfa,#8b5cf6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(139,92,246,0.6);
}

.hero p{
  color:#94a3b8;
  margin-bottom:40px;
}

.main-btn{
  padding:16px 45px;
  border-radius:14px;
  background:linear-gradient(90deg,#6366f1,#8b5cf6);
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
  margin-bottom:35px;
}

.main-btn:hover{
  transform:translateY(-5px);
  box-shadow:0 0 45px rgba(139,92,246,0.9);
}

.hero-links{
  display:flex;
  gap:25px;
  flex-wrap:wrap;
}

.hero-links a{
  padding:14px 26px;
  border-radius:14px;
  text-decoration:none;
  color:#cbd5e1;
  background:rgba(30,41,59,0.45);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}

.hero-links a:hover{
  transform:translateY(-4px);
  border:1px solid #8b5cf6;
  box-shadow:0 0 25px rgba(139,92,246,0.7);
  color:white;
}

/* ================== МОНЕТЫ ================== */

.coin{
  position:absolute;
  width:85px;
  opacity:0;
  filter:drop-shadow(0 0 20px rgba(139,92,246,0.5));
  animation:rise linear infinite;
}

/* разные скорости и задержки */
.c1{ left:8%;  animation:rise 32s linear infinite; animation-delay:-5s;}
.c2{ left:20%; animation:rise 28s linear infinite; animation-delay:-12s;}
.c3{ left:35%; animation:rise 35s linear infinite; animation-delay:-18s;}
.c4{ left:55%; animation:rise 30s linear infinite; animation-delay:-8s;}
.c5{ left:70%; animation:rise 38s linear infinite; animation-delay:-15s;}
.c6{ left:85%; animation:rise 34s linear infinite; animation-delay:-22s;}

@keyframes rise{

  0%{
    transform:translateY(150vh) translateX(0px) rotate(0deg);
    opacity:0;
  }

  10%{
    opacity:0.25;
  }

  30%{
    transform:translateY(90vh) translateX(40px) rotate(90deg);
  }

  60%{
    transform:translateY(40vh) translateX(-30px) rotate(200deg);
  }

  90%{
    opacity:0.25;
  }

  100%{
    transform:translateY(-50vh) translateX(20px) rotate(360deg);
    opacity:0;
  }
}

/* MOBILE */
@media(max-width:768px){
  body{overflow:auto;}
  .hero h1{font-size:34px;}
  .coin{width:50px;}
}

</style>
</head>
<body>

<nav>
  🚀 CryptoStart AI
</nav>

<div class="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>

  <a href="education.html" class="main-btn">
    Начать обучение
  </a>

  <div class="hero-links">
    <a href="rates.html">💰 Курсы</a>
    <a href="ai.html">🤖 AI</a>
    <a href="about.html">🌍 О проекте</a>
  </div>
</div>

<!-- Монеты -->
<img class="coin c1" src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=029">
<img class="coin c2" src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=029">
<img class="coin c3" src="https://cryptologos.cc/logos/solana-sol-logo.svg?v=029">
<img class="coin c4" src="https://cryptologos.cc/logos/binance-coin-bnb-logo.svg?v=029">
<img class="coin c5" src="https://cryptologos.cc/logos/xrp-xrp-logo.svg?v=029">
<img class="coin c6" src="https://cryptologos.cc/logos/cardano-ada-logo.svg?v=029">

<script>

const coins = [
  "https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=029",
  "https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=029",
  "https://cryptologos.cc/logos/solana-sol-logo.svg?v=029",
  "https://cryptologos.cc/logos/binance-coin-bnb-logo.svg?v=029",
  "https://cryptologos.cc/logos/xrp-xrp-logo.svg?v=029",
  "https://cryptologos.cc/logos/cardano-ada-logo.svg?v=029",
  "https://cryptologos.cc/logos/polygon-matic-logo.svg?v=029"
];

function createCoin(){
  const coin = document.createElement("img");
  coin.src = coins[Math.floor(Math.random() * coins.length)];
  coin.className = "floating-coin";

  const size = Math.random() * 50 + 50;
  coin.style.width = size + "px";
  coin.style.height = size + "px";

  coin.style.left = Math.random() * 100 + "vw";
  coin.style.animationDuration = (Math.random() * 8 + 8) + "s";
  coin.style.opacity = Math.random() * 0.2 + 0.15;

  document.body.appendChild(coin);

  setTimeout(()=>{
    coin.remove();
  },15000);
}

setInterval(createCoin, 700);

/* ===== ДИНАМИЧЕСКИЕ ЛЕТАЮЩИЕ МОНЕТЫ ===== */

.floating-coin{
  position:fixed;
  bottom:-120px;
  pointer-events:none;
  animation:flyUp linear forwards;
  filter:drop-shadow(0 0 20px rgba(139,92,246,0.5));
  z-index:1;
}

@keyframes flyUp{
  0%{
    transform:translateY(0) rotate(0deg);
  }
  100%{
    transform:translateY(-120vh) rotate(360deg);
  }
}

</script>

</body>
</html>
