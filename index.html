<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>

/* ===== ОСНОВА ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  overflow:hidden;
  background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
  background-size:400% 400%;
  animation:bgMove 20s infinite alternate;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

/* ===== НАВБАР ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.85);
  backdrop-filter:blur(10px);
  position:relative;
  z-index:10;
}

/* ===== HERO ===== */

.hero{
  text-align:center;
  margin-top:120px;
  position:relative;
  z-index:5;
}

.hero h1{
  font-size:52px;
  margin-bottom:20px;
}

.hero p{
  color:#94a3b8;
  margin-bottom:30px;
}

.hero button{
  padding:14px 30px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.hero button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(139,92,246,0.6);
}

/* ===== КНОПКИ НИЖЕ ===== */

.hero-links{
  margin-top:80px; /* ОПУСТИЛ НИЖЕ */
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.hero-links a{
  padding:14px 26px;
  border-radius:14px;
  text-decoration:none;
  color:#cbd5e1;
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}

.hero-links a:hover{
  transform:translateY(-4px);
  color:white;
  border:1px solid rgba(139,92,246,0.6);
  box-shadow:0 0 20px rgba(139,92,246,0.4);
}

/* ===== ХАОТИЧНЫЕ МОНЕТЫ ===== */

.coin{
  position:absolute;
  font-size:60px;
  opacity:0.07;
  animation:float linear infinite;
}

@keyframes float{
  0%{
    transform:translateY(100vh) rotate(0deg);
  }
  100%{
    transform:translateY(-20vh) rotate(360deg);
  }
}

/* Разные скорости */
.c1{ left:5%; animation-duration:18s; }
.c2{ left:15%; animation-duration:25s; }
.c3{ left:30%; animation-duration:20s; }
.c4{ left:45%; animation-duration:30s; }
.c5{ left:60%; animation-duration:22s; }
.c6{ left:75%; animation-duration:28s; }
.c7{ left:85%; animation-duration:24s; }
.c8{ left:95%; animation-duration:32s; }

/* ===== МОБИЛЬНАЯ АДАПТАЦИЯ ===== */

@media (max-width: 768px){

  body{
    overflow:auto;
  }

  .hero{
    margin-top:80px;
    padding:0 20px;
  }

  .hero h1{
    font-size:32px;
  }

  .hero p{
    font-size:14px;
  }

  .hero button{
    width:100%;
    max-width:300px;
  }

  .hero-links{
    margin-top:50px;
    gap:15px;
  }

  .hero-links a{
    width:100%;
    max-width:280px;
    text-align:center;
  }

  .coin{
    font-size:40px;
    opacity:0.05;
  }

}

</style>
</head>
<body>

<nav>
  🚀 CryptoStart AI
</nav>

<div class="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>

  <button onclick="location.href='education.html'">
    Начать обучение
  </button>

  <div class="hero-links">
    <a href="education.html">📚 Обучение</a>
    <a href="rates.html">💰 Курсы</a>
    <a href="ai.html">🤖 AI</a>
    <a href="about.html">🌍 О проекте</a>
  </div>
</div>

<!-- МНОГО КРИПТЫ -->
<div class="coin c1">₿</div>
<div class="coin c2">◆</div>
<div class="coin c3">Ξ</div>
<div class="coin c4">◎</div>
<div class="coin c5">₮</div>
<div class="coin c6">✕</div>
<div class="coin c7">Ł</div>
<div class="coin c8">Ð</div>

</body>
</html>
