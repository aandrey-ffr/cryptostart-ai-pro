<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>

/* ===== ОСНОВА ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  overflow:hidden;

  background:linear-gradient(
    135deg,
    #0f172a,
    #1e1b4b,
    #312e81,
    #0f172a
  );

  background-size:300% 300%;
  animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== НАВБАР ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.8);
  backdrop-filter:blur(12px);
  position:relative;
  z-index:10;
  font-weight:bold;
}

/* ===== HERO ===== */

.hero{
  text-align:center;
  margin-top:120px;
  position:relative;
  z-index:5;
}

.hero h1{
  font-size:52px;
  margin-bottom:20px;
}

.hero p{
  color:#cbd5e1;
  margin-bottom:60px;
}

.hero-links{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.hero-links a{
  padding:16px 30px;
  border-radius:14px;
  text-decoration:none;
  color:#e2e8f0;
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.hero-links a:hover{
  transform:translateY(-6px);
  border:1px solid #8b5cf6;
  box-shadow:0 0 25px rgba(139,92,246,0.6);
  color:white;
}

/* ===== ДЕТАЛИЗИРОВАННЫЕ МОНЕТЫ ===== */

.coin{
  position:absolute;
  width:70px;
  height:70px;
  opacity:0.08;
  animation:float linear infinite;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.2));
}

/* Разные скорости */
.c1{ left:5%; animation-duration:18s; }
.c2{ left:20%; animation-duration:22s; }
.c3{ left:35%; animation-duration:20s; }
.c4{ left:55%; animation-duration:26s; }
.c5{ left:75%; animation-duration:24s; }
.c6{ left:90%; animation-duration:28s; }

@keyframes float{
  0%{
    transform:translateY(110vh) rotate(0deg);
  }
  100%{
    transform:translateY(-20vh) rotate(360deg);
  }
}

/* ===== МОБИЛКА ===== */

@media (max-width:768px){

  body{
    overflow:auto;
  }

  .hero{
    margin-top:80px;
    padding:0 20px;
  }

  .hero h1{
    font-size:32px;
  }

  .hero-links a{
    width:100%;
    max-width:280px;
    text-align:center;
  }

  .coin{
    width:45px;
    height:45px;
  }

}

</style>
</head>
<body>

<nav>
  🚀 CryptoStart AI
</nav>

<div class="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>

  <div class="hero-links">
    <a href="education.html">📚 Обучение</a>
    <a href="rates.html">💰 Курсы</a>
    <a href="ai.html">🤖 AI</a>
    <a href="about.html">🌍 О проекте</a>
  </div>
</div>

<!-- ===== SVG МОНЕТЫ ===== -->

<img class="coin c1" src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=029">
<img class="coin c2" src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=029">
<img class="coin c3" src="https://cryptologos.cc/logos/solana-sol-logo.svg?v=029">
<img class="coin c4" src="https://cryptologos.cc/logos/binance-coin-bnb-logo.svg?v=029">
<img class="coin c5" src="https://cryptologos.cc/logos/cardano-ada-logo.svg?v=029">
<img class="coin c6" src="https://cryptologos.cc/logos/xrp-xrp-logo.svg?v=029">

</body>
</html>
