<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>

/* ===== ЧИСТЫЙ ГРАДИЕНТ (БЕЗ ПОЛОС) ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  overflow:hidden;

  background:linear-gradient(
    135deg,
    #0f172a 0%,
    #1e293b 40%,
    #1e1b4b 70%,
    #0f172a 100%
  );

  background-size:200% 200%;
  animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== NAVBAR ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(12px);
  position:relative;
  z-index:10;
  font-weight:bold;
}

/* ===== HERO ===== */

.hero{
  text-align:center;
  margin-top:120px;
  position:relative;
  z-index:5;
}

.hero h1{
  font-size:54px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#60a5fa,#8b5cf6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:#94a3b8;
  margin-bottom:40px;
  font-size:18px;
}

/* ===== ГЛАВНАЯ КНОПКА ===== */

.main-btn{
  display:inline-block;
  padding:16px 40px;
  border-radius:14px;
  background:linear-gradient(90deg,#3b82f6,#8b5cf6);
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.main-btn:hover{
  transform:translateY(-4px);
  box-shadow:0 0 35px rgba(139,92,246,0.7);
}

/* ===== ВТОРИЧНЫЕ КНОПКИ ===== */

.hero-links{
  margin-top:50px;
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}

.hero-links a{
  padding:14px 26px;
  border-radius:14px;
  text-decoration:none;
  color:#cbd5e1;
  background:rgba(30,41,59,0.5);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}

.hero-links a:hover{
  transform:translateY(-4px);
  border:1px solid #8b5cf6;
  box-shadow:0 0 20px rgba(139,92,246,0.6);
  color:white;
}

/* ===== МОНЕТЫ ===== */

.coin{
  position:absolute;
  width:80px;
  height:80px;
  opacity:0.18; /* СТАЛИ ВИДНЕЕ */
  animation:float linear infinite;
  filter:drop-shadow(0 0 20px rgba(139,92,246,0.4));
}

.c1{ left:8%; animation-duration:20s; }
.c2{ left:25%; animation-duration:24s; }
.c3{ left:45%; animation-duration:22s; }
.c4{ left:65%; animation-duration:26s; }
.c5{ left:85%; animation-duration:28s; }

@keyframes float{
  0%{ transform:translateY(110vh) rotate(0deg);}
  100%{ transform:translateY(-20vh) rotate(360deg);}
}

/* ===== МОБИЛКА ===== */

@media (max-width:768px){

  body{overflow:auto;}

  .hero{margin-top:80px;padding:0 20px;}

  .hero h1{font-size:34px;}

  .main-btn{
    display:block;
    margin:0 auto;
    max-width:280px;
  }

  .hero-links a{
    width:100%;
    max-width:260px;
    text-align:center;
  }

  .coin{
    width:50px;
    height:50px;
  }
}

</style>
</head>
<body>

<nav>
  🚀 CryptoStart AI
</nav>

<div class="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>

  <!-- ГЛАВНАЯ КНОПКА ПО СЕРЕДИНЕ -->
  <a href="education.html" class="main-btn">
    Начать обучение
  </a>

  <div class="hero-links">
    <a href="rates.html">💰 Курсы</a>
    <a href="ai.html">🤖 AI</a>
    <a href="about.html">🌍 О проекте</a>
  </div>
</div>

<!-- SVG монеты -->
<img class="coin c1" src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=029">
<img class="coin c2" src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=029">
<img class="coin c3" src="https://cryptologos.cc/logos/solana-sol-logo.svg?v=029">
<img class="coin c4" src="https://cryptologos.cc/logos/binance-coin-bnb-logo.svg?v=029">
<img class="coin c5" src="https://cryptologos.cc/logos/xrp-xrp-logo.svg?v=029">

</body>
</html>
