<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  color:white;
  overflow-x:hidden;
  background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
}

/* фон монет */
.coin{
  position:absolute;
  width:80px;
  opacity:0.15;
  animation: float 20s linear infinite;
}

@keyframes float{
  0%{ transform:translateY(0px);}
  50%{ transform:translateY(-40px);}
  100%{ transform:translateY(0px);}
}

nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}

.hero{
  text-align:center;
  margin-top:180px;
}

h1{
  font-size:55px;
}

p{
  font-size:18px;
  opacity:0.8;
}

button{
  margin-top:30px;
  padding:14px 28px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#06b6d4,#6366f1);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- Монеты -->
<img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" class="coin" style="top:20%; left:10%;">
<img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" class="coin" style="top:60%; left:80%;">
<img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="coin" style="top:40%; left:50%;">

<nav>
  <div><b>CryptoStart AI 🚀</b></div>
  <div>
    <a href="education.html">Обучение</a>
    <a href="rates.html">Курсы</a>
    <a href="ai.html">AI</a>
    <a href="about.html">О проекте</a>
  </div>
</nav>

<div class="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>
  <button onclick="window.location.href='education.html'">
    Начать обучение
  </button>
</div>

</body>
</html>
