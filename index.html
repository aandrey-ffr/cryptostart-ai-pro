<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>

/* ===== ФОН ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  overflow:hidden;
}

/* ===== НАВБАР ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:flex-start;
  position:relative;
  z-index:10;
}

nav b{
  font-size:18px;
}

/* ===== HERO ===== */

.hero{
  text-align:center;
  margin-top:120px;
  position:relative;
  z-index:3;
}

.hero h1{
  font-size:52px;
  margin-bottom:20px;
}

.hero p{
  color:#94a3b8;
  margin-bottom:30px;
}

.hero button{
  padding:14px 30px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.hero button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(139,92,246,0.5);
}

/* ===== ССЫЛКИ ПОД КНОПКОЙ ===== */

.hero-links{
  margin-top:50px;
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.hero-links a{
  padding:14px 26px;
  border-radius:14px;
  text-decoration:none;
  color:#cbd5e1;
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}

.hero-links a:hover{
  transform:translateY(-4px);
  color:white;
  border:1px solid rgba(139,92,246,0.6);
  box-shadow:0 0 20px rgba(139,92,246,0.4);
}

/* ===== ФОНОВЫЕ МОНЕТЫ ===== */

.coin{
  position:absolute;
  font-size:120px;
  opacity:0.05;
}

.coin1{ top:120px; left:100px; }
.coin2{ bottom:150px; right:200px; }

</style>
</head>
<body>

<nav>
  <b>🚀 CryptoStart AI</b>
</nav>

<div class="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>

  <button onclick="location.href='education.html'">
    Начать обучение
  </button>

  <div class="hero-links">
    <a href="education.html">📚 Обучение</a>
    <a href="rates.html">💰 Курсы</a>
    <a href="ai.html">🤖 AI</a>
    <a href="about.html">🌍 О проекте</a>
  </div>
</div>

<!-- Фон -->
<div class="coin coin1">₿</div>
<div class="coin coin2">◆</div>

</body>
</html>
