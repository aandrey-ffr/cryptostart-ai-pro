<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>

/* =========================
   СБРОС
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI, sans-serif;
  color:white;
  overflow:hidden;
  min-height:100vh;

  /* ГЛУБОКИЙ ФОН */
  background:
    radial-gradient(circle at 20% 30%, rgba(139,92,246,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(59,130,246,0.25), transparent 40%),
    linear-gradient(135deg, #0b1120 0%, #1e1b4b 50%, #312e81 100%);
}

/* =========================
   NAVBAR
========================= */
nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.75);
  backdrop-filter:blur(14px);
  font-weight:bold;
  position:relative;
  z-index:10;
}

/* =========================
   HERO
========================= */
.hero{
  text-align:center;
  margin-top:120px;
  position:relative;
  z-index:10;
}

.hero h1{
  font-size:56px;
  font-weight:800;
  margin-bottom:20px;

  background:linear-gradient(90deg,#60a5fa,#a78bfa,#8b5cf6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:0 0 35px rgba(139,92,246,0.5);
}

.hero p{
  color:#94a3b8;
  margin-bottom:45px;
  font-size:18px;
}

/* =========================
   ГЛАВНАЯ КНОПКА
========================= */
.main-btn{
  display:inline-block;
  padding:16px 45px;
  border-radius:14px;
  background:linear-gradient(90deg,#6366f1,#8b5cf6);
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.main-btn:hover{
  transform:translateY(-5px);
  box-shadow:0 0 45px rgba(139,92,246,0.9);
}

/* =========================
   ВТОРИЧНЫЕ КНОПКИ
========================= */
.hero-links{
  margin-top:50px;
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}

.hero-links a{
  padding:14px 26px;
  border-radius:14px;
  text-decoration:none;
  color:#cbd5e1;
  background:rgba(30,41,59,0.4);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}

.hero-links a:hover{
  transform:translateY(-4px);
  border:1px solid #8b5cf6;
  box-shadow:0 0 25px rgba(139,92,246,0.7);
  color:white;
}

/* =========================
   ГЛУБИНА (BLUR СЛОЙ)
========================= */
.blur-layer{
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(139,92,246,0.3), transparent 60%);
  filter:blur(120px);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:1;
}

/* =========================
   МОНЕТЫ (ХАОТИЧНЫЕ)
========================= */
.coin{
  position:absolute;
  width:85px;
  height:85px;
  opacity:0.22;
  filter:drop-shadow(0 0 20px rgba(139,92,246,0.5));
  animation:floatUp linear infinite;
}

/* разные позиции и скорости */
.c1{ left:8%; animation-duration:19s; }
.c2{ left:22%; animation-duration:24s; }
.c3{ left:40%; animation-duration:21s; }
.c4{ left:60%; animation-duration:26s; }
.c5{ left:78%; animation-duration:23s; }
.c6{ left:90%; animation-duration:28s; }

@keyframes floatUp{
  0%{
    transform:translateY(120vh) translateX(0px) rotate(0deg);
  }

  20%{
    transform:translateY(90vh) translateX(-30px) rotate(60deg);
  }

  40%{
    transform:translateY(60vh) translateX(40px) rotate(140deg);
  }

  60%{
    transform:translateY(30vh) translateX(-20px) rotate(220deg);
  }

  80%{
    transform:translateY(10vh) translateX(25px) rotate(300deg);
  }

  100%{
    transform:translateY(-25vh) translateX(-10px) rotate(360deg);
  }
}

/* =========================
   МОБИЛКА
========================= */
@media(max-width:768px){

  body{overflow:auto;}

  .hero{
    margin-top:80px;
    padding:0 20px;
  }

  .hero h1{
    font-size:34px;
  }

  .coin{
    width:50px;
    height:50px;
  }
}

</style>
</head>
<body>

<nav>
  🚀 CryptoStart AI
</nav>

<div class="hero">
  <h1>Изучай криптовалюты современно</h1>
  <p>Блокчейн • Инвестиции • Безопасность • AI-помощник</p>

  <a href="education.html" class="main-btn">
    Начать обучение
  </a>

  <div class="hero-links">
    <a href="rates.html">💰 Курсы</a>
    <a href="ai.html">🤖 AI</a>
    <a href="about.html">🌍 О проекте</a>
  </div>
</div>

<!-- слой глубины -->
<div class="blur-layer"></div>

<!-- Монеты -->
<img class="coin c1" src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=029">
<img class="coin c2" src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=029">
<img class="coin c3" src="https://cryptologos.cc/logos/solana-sol-logo.svg?v=029">
<img class="coin c4" src="https://cryptologos.cc/logos/binance-coin-bnb-logo.svg?v=029">
<img class="coin c5" src="https://cryptologos.cc/logos/xrp-xrp-logo.svg?v=029">
<img class="coin c6" src="https://cryptologos.cc/logos/cardano-ada-logo.svg?v=029">

</body>
</html>
