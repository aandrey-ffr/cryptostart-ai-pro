<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<style>
body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
font-size:48px;
margin-bottom:20px;
}

table{
margin:auto;
border-collapse:collapse;
margin-top:30px;
}

td,th{
border:1px solid white;
padding:10px 20px;
}

.chat-box{
max-width:600px;
margin:auto;
margin-top:40px;
}

input{
width:70%;
padding:10px;
border-radius:5px;
border:none;
}

button{
padding:10px 25px;
border:none;
border-radius:30px;
background:#2563eb;
color:white;
cursor:pointer;
margin-left:10px;
}

#chat-messages{
margin-top:20px;
text-align:left;
}
</style>
</head>

<body>

<h1>CryptoStart AI 🚀</h1>

<h2>Курсы криптовалют</h2>

<table>
<tr><th>Валюта</th><th>USD</th></tr>
<tr><td>Bitcoin</td><td id="btc">loading...</td></tr>
<tr><td>Ethereum</td><td id="eth">loading...</td></tr>
<tr><td>USDT</td><td id="usdt">loading...</td></tr>
</table>

<div class="chat-box">
<h2>AI помощник</h2>
<input type="text" id="question" placeholder="Введите вопрос...">
<button onclick="askAI()">Спросить</button>
<div id="chat-messages"></div>
</div>

<script>
/* Загрузка курсов */
fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether&vs_currencies=usd")
.then(res=>res.json())
.then(data=>{
document.getElementById("btc").innerText=data.bitcoin.usd;
document.getElementById("eth").innerText=data.ethereum.usd;
document.getElementById("usdt").innerText=data.tether.usd;
});

/* Чат */
function addMessage(text){
  const messages = document.getElementById("chat-messages");
  const div = document.createElement("div");
  div.style.marginBottom = "10px";
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function askAI() {
  const input = document.getElementById("question");
  const text = input.value;
  if (!text) return;

  addMessage("Вы: " + text);
  input.value = "";

  addMessage("AI печатает...");

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await response.json();

    const messages = document.getElementById("chat-messages");
    messages.lastChild.remove();

    addMessage("AI: " + data.reply);

  } catch (error) {
    addMessage("Ошибка подключения к серверу.");
  }
}
</script>

</body>
</html>
