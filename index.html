<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoStart AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    color: white;
    overflow: hidden;
    height: 100vh;
    background: linear-gradient(135deg, #05010a 0%, #0c0218 50%, #14022a 100%);
}

/* затемнение + глубина */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: 
        radial-gradient(circle at 25% 30%, rgba(0,0,0,0.85), transparent 55%),
        radial-gradient(circle at 75% 70%, rgba(0,0,0,0.75), transparent 55%),
        linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9));
    z-index: 0;
}

.logo {
    position: absolute;
    top: 20px;
    left: 40px;
    font-weight: 600;
    font-size: 18px;
    z-index: 2;
}

.container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 120px;
}

h1 {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #a78bfa, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: #b8a9d9;
    margin-bottom: 40px;
}

/* Главная кнопка */
.main-btn {
    padding: 16px 40px;
    font-size: 18px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg, #6d28d9, #9333ea);
    color: white;
    transition: 0.3s ease;
}

.main-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 35px rgba(147,51,234,0.5);
}

/* Кнопки навигации */
.nav-buttons {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.nav-buttons button {
    padding: 14px 30px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
    transition: 0.3s ease;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px; /* расстояние между смайлом и текстом */
}

.nav-buttons button:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-3px);
}

/* Плавающие символы */
.floating {
    position: absolute;
    font-size: 42px;
    opacity: 0.06;
    animation: float 10s infinite ease-in-out;
}

.f1 { top: 20%; left: 10%; }
.f2 { bottom: 15%; left: 20%; animation-delay: 2s; }
.f3 { bottom: 10%; right: 15%; animation-delay: 4s; }
.f4 { top: 15%; right: 10%; animation-delay: 1s; }

@keyframes float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-25px); }
}
</style>
</head>
<body>

<div class="logo">
    🚀 CryptoStart AI
</div>

<div class="container">
    <h1>💎 Изучай криптовалюты современно</h1>

    <div class="subtitle">
        🔗 Блокчейн • 📈 Инвестиции • 🔐 Безопасность • 🤖 AI-помощник
    </div>

    <button class="main-btn">🚀 Начать обучение</button>

    <div class="nav-buttons">
        <button>📚 Курсы</button>
        <button>🤖 AI</button>
        <button>ℹ️ О проекте</button>
    </div>
</div>

<!-- Фоновые крипто символы -->
<div class="floating f1">₿</div>
<div class="floating f2">Ξ</div>
<div class="floating f3">◎</div>
<div class="floating f4">💰</div>

</body>
</html>
