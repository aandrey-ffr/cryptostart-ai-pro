<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучение | CryptoStart</title>

<style>

nav:not(.navbar),
body > nav:first-of-type,
body > ul:first-of-type{
  display:none !important;
}

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#020617,#1e293b,#0f172a,#1e1b4b,#1e3a8a);
  background-size:600% 600%;
  animation:gradientMove 12s ease infinite;
  overflow-x:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* NAVBAR */

.navbar{
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 40px;
  box-sizing:border-box;
  background:rgba(15,23,42,0.8);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  font-size:20px;
  font-weight:bold;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.menu{
  display:flex;
  gap:25px;
}

.menu a{
  text-decoration:none;
  color:white;
  font-size:14px;
  transition:0.3s;
}

.menu a:hover{
  color:#38bdf8;
}

/* TITLE */

.title{
  text-align:center;
  margin-top:40px;
}

h1{
  margin-bottom:20px;
}

/* PROGRESS */

.progress{
  width:300px;
  height:6px;
  margin:0 auto 60px auto;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  transition:0.4s;
}

/* GRID */

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
  max-width:900px;
  margin:0 auto;
}

/* CARD */

.card{
  width:200px;
  height:200px;
  perspective:1000px;
  cursor:pointer;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform 0.6s;
  transform-style:preserve-3d;
}

.card.active .card-inner{
  transform:rotateY(180deg);
}

.card-front,
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  background:rgba(30,41,59,0.8);
  border:1px solid rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  backface-visibility:hidden;
  box-sizing:border-box;
}

.card:hover .card-front{
  box-shadow:
    0 0 15px rgba(56,189,248,0.6),
    0 0 40px rgba(139,92,246,0.6);
}

.card-back{
  transform:rotateY(180deg);
}

.icon{
  font-size:40px;
  margin-bottom:10px;
}

.coin{
  position:fixed;
  font-size:20px;
  opacity:0.12;
  animation:float linear infinite;
  pointer-events:none;
}

@keyframes float{
  0%{transform:translateY(0);} 
  100%{transform:translateY(-140vh);} 
} 
  100%{transform:translateY(-20vh);} 
}



/* ===== MOBILE ADAPT (ОБУЧЕНИЕ) ===== */
@media(max-width:768px){

  .navbar{
    padding:0 15px;
  }

  .menu{
    gap:12px;
    font-size:12px;
  }

  .title{
    margin-top:20px;
    padding:0 10px;
  }

  h1{
    font-size:22px;
  }

  .progress{
    width:80%;
    margin-bottom:30px;
  }

  .grid{
    gap:20px;
    padding:0 15px;
  }

  .card{
    width:45%;
    height:150px;
  }

  .icon{
    font-size:28px;
  }

}

</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🚀 CryptoStart</div>
  <div class="menu">
    <a href="index.html">🏠 Главная</a>
    <a href="about.html">📘 О проекте</a>
    <a href="contact.html">📩 Контакты</a>
  </div>
</div>
  <div class="menu">
    <a href="index.html">Главная</a>
    <a href="learn.html">Обучение</a>
    <a href="about.html">О проекте</a>
    <a href="contact.html">Контакты</a>
  </div>
</div>

<script>
const coins=["₿","Ξ","◈","◎","✦","✧"];
const count=window.innerWidth<768?10:20;

for(let i=0;i<count;i++){
  let c=document.createElement("div");
  c.className="coin";
  c.innerText=coins[Math.floor(Math.random()*coins.length)];
  c.style.left=Math.random()*100+"vw";
  c.style.top=Math.random()*100+"vh";
  c.style.animationDuration=(20+Math.random()*20)+"s";
  c.style.animationDelay=(-Math.random()*40)+"s";
  document.body.appendChild(c);
}
</script>

<div class="title">
<h1>Обучение криптовалютам</h1>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>
</div>

<div class="grid" id="cards">
</div>

<script>

const data=[
"Первая и самая известная криптовалюта",
"Система записи всех транзакций",
"Хранение криптовалют",
"Покупка и продажа крипты",
"Заработок на изменении цены",
"Никому не передавайте ключи",
"Создание новых монет",
"Цифровые деньги будущего"
];

const names=["Bitcoin","Блокчейн","Кошелёк","Биржа","Трейдинг","Безопасность","Майнинг","Криптовалюта"];
const icons=["₿","⛓","💳","🏛","📈","🔐","⛏","🪙"];

let opened=new Set(JSON.parse(localStorage.getItem("progress"))||[]);

const container=document.getElementById("cards");

names.forEach((name,i)=>{
  container.innerHTML+=`
  <div class="card ${opened.has(i)?'active':''}" onclick="toggle(this,${i})">
    <div class="card-inner">
      <div class="card-front">
        <div class="icon">${icons[i]}</div>
        ${name}
      </div>
      <div class="card-back">
        ${data[i]}
      </div>
    </div>
  </div>`;
});

function toggle(card,i){
 card.classList.toggle("active");
 if(card.classList.contains("active")){
   opened.add(i);
 } else {
   opened.delete(i);
 }
 localStorage.setItem("progress",JSON.stringify([...opened]));
 update();
}

function update(){
 let total=names.length;
 let percent=(opened.size/total)*100;
 document.getElementById("progressBar").style.width=percent+"%";
}

update();

</script>

</body>
</html>
