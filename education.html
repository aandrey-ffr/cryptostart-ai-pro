<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Обучение</title>

<style>
body{
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
  margin:0;
  padding:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:25px;
  margin-top:40px;
}

.card{
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  background:#334155;
}

.icon{
  font-size:40px;
}

.info{
  margin-top:30px;
  padding:20px;
  background:#1e293b;
  border-radius:12px;
  display:none;
}
</style>
</head>

<body>

<h1>Обучение криптовалютам</h1>

<div class="grid">

<div class="card" onclick="showInfo('crypto')">
<div class="icon">🪙</div>
<h3>Что такое криптовалюта</h3>
</div>

<div class="card" onclick="showInfo('blockchain')">
<div class="icon">⛓️</div>
<h3>Блокчейн</h3>
</div>

<div class="card" onclick="showInfo('mining')">
<div class="icon">⛏️</div>
<h3>Майнинг</h3>
</div>

<div class="card" onclick="showInfo('security')">
<div class="icon">🔐</div>
<h3>Безопасность</h3>
</div>

</div>

<div id="infoBox" class="info"></div>

<script>
function showInfo(type){
  const box = document.getElementById("infoBox");
  box.style.display="block";

  if(type==="crypto"){
    box.innerHTML="Криптовалюта — это цифровые деньги, работающие на технологии блокчейн.";
  }
  if(type==="blockchain"){
    box.innerHTML="Блокчейн — это распределённая база данных, защищённая криптографией.";
  }
  if(type==="mining"){
    box.innerHTML="Майнинг — процесс подтверждения транзакций и создания новых монет.";
  }
  if(type==="security"){
    box.innerHTML="Используйте холодные кошельки и двухфакторную аутентификацию.";
  }
}
</script>

</body>
</html>
