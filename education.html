<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучение | CryptoStart</title>

<style>

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#020617,#1e293b,#0f172a,#1e1b4b,#1e3a8a);
  background-size:600% 600%;
  animation:gradientMove 12s ease infinite;
  overflow-x:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* WEB3 GRID */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

/* NAV */
nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
}

/* TITLE CENTER */
.title-wrapper{
  text-align:center;
  margin-top:30px;
}

h1{
  font-size:36px;
  margin-bottom:20px;
}

/* PROGRESS UNDER TITLE */
.progress{
  width:300px;
  height:6px;
  margin:0 auto 60px auto;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  transition:0.4s;
}

/* GRID CENTER */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
  max-width:900px;
  margin:0 auto;
}

/* CUBES */
.card{
  width:200px;
  height:200px;
  background:rgba(30,41,59,0.8);
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  cursor:pointer;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.05);
}

/* NEON */
.card:hover{
  box-shadow:
    0 0 15px rgba(56,189,248,0.6),
    0 0 40px rgba(139,92,246,0.6);
}

/* ICON TOP */
.icon{
  font-size:40px;
  margin-bottom:10px;
}

/* FLOATING COINS */
.coin{
  position:fixed;
  font-size:18px;
  opacity:0.05;
  animation:float 35s linear infinite;
}

@keyframes float{
  0%{transform:translateY(110vh);}
  100%{transform:translateY(-20vh);}
}

</style>
</head>

<body>

<!-- FLOATING COINS -->
<script>
const coins=["₿","Ξ","◈","◎"];
const count=window.innerWidth<768?10:20;

for(let i=0;i<count;i++){
  let c=document.createElement("div");
  c.className="coin";
  c.innerText=coins[Math.floor(Math.random()*coins.length)];
  c.style.left=Math.random()*100+"vw";
  c.style.animationDelay=Math.random()*20+"s";
  document.body.appendChild(c);
}
</script>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div>
    🏠 Главная
    💰 Курсы
    🤖 AI
    🌐 О проекте
  </div>
</nav>

<div class="title-wrapper">
<h1>Обучение криптовалютам</h1>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>
</div>

<div class="grid">

<div class="card" onclick="openCard(0)">
<div class="icon">₿</div>
Bitcoin
</div>

<div class="card" onclick="openCard(1)">
<div class="icon">⛓</div>
Блокчейн
</div>

<div class="card" onclick="openCard(2)">
<div class="icon">💳</div>
Кошелёк
</div>

<div class="card" onclick="openCard(3)">
<div class="icon">🏛</div>
Биржа
</div>

<div class="card" onclick="openCard(4)">
<div class="icon">📈</div>
Трейдинг
</div>

<div class="card" onclick="openCard(5)">
<div class="icon">🔐</div>
Безопасность
</div>

<div class="card" onclick="openCard(6)">
<div class="icon">⛏</div>
Майнинг
</div>

<div class="card" onclick="openCard(7)">
<div class="icon">🪙</div>
Криптовалюта
</div>

</div>

<script>
let opened=new Set();

function openCard(i){
 opened.add(i);
 localStorage.setItem("progress",JSON.stringify([...opened]));
 update();
}

function update(){
 let total=8;
 let percent=(opened.size/total)*100;
 document.getElementById("progressBar").style.width=percent+"%";
}

window.onload=()=>{
 let saved=JSON.parse(localStorage.getItem("progress"))||[];
 saved.forEach(i=>opened.add(i));
 update();
}
</script>

</body>
</html>
