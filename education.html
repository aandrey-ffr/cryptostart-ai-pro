<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучение | CryptoStart</title>

<style>

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#020617,#1e293b,#0f172a,#1e1b4b,#1e3a8a);
  background-size:600% 600%;
  animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* TITLE */

.title{
  text-align:center;
  margin-top:40px;
}

/* PROGRESS */

.progress{
  width:260px;
  height:6px;
  margin:20px auto 50px auto;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  transition:0.4s;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(3, 160px);
  justify-content:center;
  gap:50px;
}

/* ЁЛКА */

.grid .card:nth-child(1){grid-column:2;}
.grid .card:nth-child(2){grid-column:1;}
.grid .card:nth-child(3){grid-column:3;}
.grid .card:nth-child(4){grid-column:2;}
.grid .card:nth-child(5){grid-column:1;}
.grid .card:nth-child(6){grid-column:3;}
.grid .card:nth-child(7){grid-column:2;}
.grid .card:nth-child(8){grid-column:2;}

/* CARD */

.card{
  width:160px;
  height:160px;
  perspective:1000px;
  cursor:pointer;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:transform 0.6s;
}

/* НЕ МЕНЯЕТ РАЗМЕР */

.card-front,
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:18px;
  background:rgba(30,41,59,0.85);
  border:1px solid rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:15px;
  backface-visibility:hidden;
}

.card-back{
  transform:rotateY(180deg);
}

.card.active .card-inner{
  transform:rotateY(180deg);
}

.icon{
  font-size:30px;
  margin-bottom:8px;
}

</style>
</head>

<body>

<div class="title">
<h1>Обучение криптовалютам</h1>
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="grid">

<div class="card" onclick="toggle(this,0)">
<div class="card-inner">
<div class="card-front"><div class="icon">₿</div>Bitcoin</div>
<div class="card-back">Первая цифровая валюта</div>
</div>
</div>

<div class="card" onclick="toggle(this,1)">
<div class="card-inner">
<div class="card-front"><div class="icon">⛓</div>Блокчейн</div>
<div class="card-back">Система транзакций</div>
</div>
</div>

<div class="card" onclick="toggle(this,2)">
<div class="card-inner">
<div class="card-front"><div class="icon">💳</div>Кошелёк</div>
<div class="card-back">Хранение крипты</div>
</div>
</div>

<div class="card" onclick="toggle(this,3)">
<div class="card-inner">
<div class="card-front"><div class="icon">🏛</div>Биржа</div>
<div class="card-back">Покупка крипты</div>
</div>
</div>

<div class="card" onclick="toggle(this,4)">
<div class="card-inner">
<div class="card-front"><div class="icon">📈</div>Трейдинг</div>
<div class="card-back">Заработок</div>
</div>
</div>

<div class="card" onclick="toggle(this,5)">
<div class="card-inner">
<div class="card-front"><div class="icon">🔐</div>Безопасность</div>
<div class="card-back">Защита средств</div>
</div>
</div>

<div class="card" onclick="toggle(this,6)">
<div class="card-inner">
<div class="card-front"><div class="icon">⛏</div>Майнинг</div>
<div class="card-back">Создание монет</div>
</div>
</div>

<div class="card" onclick="toggle(this,7)">
<div class="card-inner">
<div class="card-front"><div class="icon">🪙</div>Криптовалюта</div>
<div class="card-back">Цифровые деньги</div>
</div>
</div>

</div>

<script>

let opened=new Set();

function toggle(card,i){
 card.classList.toggle("active");

 if(card.classList.contains("active")){
   opened.add(i);
 } else {
   opened.delete(i);
 }

 update();
}

function update(){
 let percent=(opened.size/8)*100;
 document.getElementById("progressBar").style.width=percent+"%";
}

</script>

</body>
</html>
