<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучение | CryptoStart</title>

<style>

/* ===== BODY ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#020617,#1e293b,#0f172a,#1e1b4b,#1e3a8a);
  background-size:600% 600%;
  animation:gradientMove 12s ease infinite;
  overflow-x:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== WEB3 GRID ===== */

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

/* ===== NAV ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

nav a{
  color:#cbd5e1;
  margin-left:20px;
  text-decoration:none;
}

/* ===== GRID ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(5, 220px);
  justify-content:center;
  column-gap:50px;
  row-gap:100px;
}

.grid .card:nth-child(6){ grid-column:2; }
.grid .card:nth-child(7){ grid-column:3; }
.grid .card:nth-child(8){ grid-column:4; }

/* ===== CARD ===== */

.card{
  perspective:1000px;
  width:220px;
  height:220px;
  cursor:pointer;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform 0.6s;
  transform-style:preserve-3d;
}

.card.active .card-inner{
  transform:rotateY(180deg);
}

.card-front,
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(30,41,59,0.75);
  border:1px solid rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  backface-visibility:hidden;
  padding:20px;
  text-align:center;
}

.card-back{
  transform:rotateY(180deg);
}

/* 🔥 НЕОН ВЕРНУЛ */

.card:hover .card-front{
  box-shadow:
    0 0 10px rgba(56,189,248,0.6),
    0 0 30px rgba(139,92,246,0.6);
}

/* ===== FLOATING COINS ===== */

.coin{
  position:fixed;
  font-size:20px;
  opacity:0.06;
  animation:float 35s linear infinite;
  pointer-events:none;
}

@keyframes float{
  0%{transform:translateY(110vh) rotate(0deg);}
  100%{transform:translateY(-20vh) rotate(360deg);}
}

/* ===== MOBILE ===== */

@media(max-width:768px){

  .grid{
    grid-template-columns:repeat(2, 1fr);
    justify-items:center;
    gap:30px;
  }

  .card{
    width:180px;
    height:180px;
  }

}

</style>
</head>

<body>

<!-- 20 COINS PC / 10 MOBILE -->
<script>
const coins = ["₿","Ξ","◈","◎"];

const isMobile = window.innerWidth < 768;
const coinCount = isMobile ? 10 : 20;

for(let i=0;i<coinCount;i++){
  const c = document.createElement("div");
  c.className="coin";
  c.innerText=coins[Math.floor(Math.random()*coins.length)];
  c.style.left = Math.random()*100+"vw";
  c.style.animationDelay = Math.random()*20+"s";
  document.body.appendChild(c);
}
</script>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div>
    <a href="index.html">🏠 Главная</a>
    <a href="rates.html">💰 Курсы</a>
    <a href="ai.html">🤖 AI</a>
    <a href="about.html">🌐 О проекте</a>
  </div>
</nav>

<div class="container">
<h1>Обучение криптовалютам</h1>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">₿ Bitcoin</div>
<div class="card-back">Первая криптовалюта</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">⛓ Блокчейн</div>
<div class="card-back">Система переводов</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">💳 Кошелёк</div>
<div class="card-back">Хранение крипты</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">🏛 Биржа</div>
<div class="card-back">Покупка и продажа</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">📈 Трейдинг</div>
<div class="card-back">Заработок на цене</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">🔐 Безопасность</div>
<div class="card-back">Храни ключи</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">⛏ Майнинг</div>
<div class="card-back">Создание монет</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">🪙 Криптовалюта</div>
<div class="card-back">Цифровые деньги</div>
</div></div>

</div>

</div>

<script>
function toggleCard(card){
  card.classList.toggle("active");
}
</script>

</body>
</html>
