<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучение | CryptoStart</title>

<style>

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#020617,#1e293b,#0f172a,#1e1b4b,#1e3a8a);
  background-size:600% 600%;
  animation:gradientMove 12s ease infinite;
  overflow-x:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== FLOATING COINS ===== */

.coin{
  position:fixed;
  font-size:22px;
  opacity:0.07;
  animation:float 25s linear infinite;
  pointer-events:none;
}

@keyframes float{
  0%{transform:translateY(110vh) rotate(0deg);}
  100%{transform:translateY(-20vh) rotate(360deg);}
}

/* ===== NAV ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

/* ===== CONTAINER ===== */

.container{
  padding:70px 30px;
  max-width:1200px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:60px;
}

/* ===== GRID PC ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(5, 220px);
  justify-content:center;
  column-gap:50px;
  row-gap:100px;
}

/* Центр второй строки */
.grid .card:nth-child(6){ grid-column:2; }
.grid .card:nth-child(7){ grid-column:3; }
.grid .card:nth-child(8){ grid-column:4; }

/* ===== CARD ===== */

.card{
  perspective:1000px;
  width:220px;
  height:220px;
  cursor:pointer;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform 0.6s;
  transform-style:preserve-3d;
}

.card.active .card-inner{
  transform:rotateY(180deg);
}

.card-front,
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(30,41,59,0.85);
  border:1px solid rgba(255,255,255,0.05);
  backface-visibility:hidden;
}

.card-back{
  transform:rotateY(180deg);
}

/* НЕОН */

.card:hover .card-front{
  box-shadow:
    0 0 10px rgba(56,189,248,0.5),
    0 0 25px rgba(139,92,246,0.5);
}

/* ===== MOBILE ===== */

@media(max-width:768px){

  nav{
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .grid{
    grid-template-columns:repeat(2, 1fr);
    justify-items:center;
    gap:30px;
  }

  .card{
    width:180px;
    height:180px;
  }

  .grid .card:nth-child(6),
  .grid .card:nth-child(7),
  .grid .card:nth-child(8){
    grid-column:auto;
  }

}

/* SMALL PHONE */

@media(max-width:480px){

  .grid{
    grid-template-columns:1fr;
    justify-items:center;
    gap:25px;
  }

  .card{
    width:200px;
    height:180px;
  }

}

</style>
</head>

<body>

<!-- FLOATING COINS -->
<div class="coin" style="left:10%; animation-delay:0s;">₿</div>
<div class="coin" style="left:25%; animation-delay:5s;">Ξ</div>
<div class="coin" style="left:40%; animation-delay:10s;">₿</div>
<div class="coin" style="left:60%; animation-delay:2s;">Ξ</div>
<div class="coin" style="left:75%; animation-delay:7s;">₿</div>
<div class="coin" style="left:90%; animation-delay:12s;">Ξ</div>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
</nav>

<div class="container">
<h1>Обучение криптовалютам</h1>

<div class="grid">

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">Bitcoin</div>
<div class="card-back">Первая криптовалюта</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">Блокчейн</div>
<div class="card-back">Система переводов</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">Кошелёк</div>
<div class="card-back">Хранение</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">Биржа</div>
<div class="card-back">Покупка</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">Трейдинг</div>
<div class="card-back">Доход</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">Безопасность</div>
<div class="card-back">Пароли</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">Майнинг</div>
<div class="card-back">Создание</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front">Криптовалюта</div>
<div class="card-back">Цифровые деньги</div>
</div></div>

</div>
</div>

<script>
function toggleCard(card){
  card.classList.toggle("active");
}
</script>

</body>
</html>
