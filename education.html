<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучение | CryptoStart</title>

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#020617,#1e293b,#0f172a,#1e1b4b,#1e3a8a);
  background-size:600% 600%;
  animation:gradientMove 12s ease infinite;
  overflow-x:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* NAVBAR */

.navbar{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(15,23,42,0.8);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  position:sticky;
  top:0;
  z-index:1000;
  flex-wrap:wrap;
}

.logo{
  font-weight:bold;
  font-size:18px;
}

.menu{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.menu a{
  text-decoration:none;
  color:white;
  font-size:14px;
}

/* TITLE */

.title{
  text-align:center;
  margin-top:30px;
}

/* PROGRESS */

.progress{
  width:260px;
  height:6px;
  margin:20px auto 40px auto;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  transition:0.4s;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:30px;
  max-width:900px;
  margin:0 auto;
  padding:0 20px;
}

/* CARD */

.card{
  width:100%;
  aspect-ratio:1/1;
  perspective:1000px;
  cursor:pointer;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform 0.6s;
  transform-style:preserve-3d;
}

.card.active .card-inner{
  transform:rotateY(180deg);
}

.card-front,
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  background:rgba(30,41,59,0.8);
  border:1px solid rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:15px;
  backface-visibility:hidden;
}

.card-back{
  transform:rotateY(180deg);
}

.icon{
  font-size:32px;
  margin-bottom:10px;
}

/* COINS */

.coin{
  position:fixed;
  font-size:18px;
  opacity:0.15;
  pointer-events:none;
  animation:float linear infinite;
}

@keyframes float{
  from{transform:translateY(120vh);}
  to{transform:translateY(-120vh);}
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.grid{
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

h1{
  font-size:22px;
}

.menu{
  justify-content:center;
  width:100%;
  margin-top:10px;
}

}

</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🚀 CryptoStart AI</div>
  <div class="menu">
    <a href="index.html">🏠 Главная</a>
    <a href="rates.html">📈 Курсы</a>
    <a href="ai.html">🤖 AI</a>
    <a href="about.html">📘 О проекте</a>
  </div>
</div>

<script>
const coins=["₿","Ξ","◈","◎","✦","✧"];
const count=window.innerWidth<768?10:20;

for(let i=0;i<count;i++){
  let c=document.createElement("div");
  c.className="coin";
  c.innerText=coins[Math.floor(Math.random()*coins.length)];
  c.style.left=Math.random()*100+"vw";
  c.style.animationDuration=(20+Math.random()*20)+"s";
  c.style.animationDelay=(-Math.random()*40)+"s";
  document.body.appendChild(c);
}
</script>

<div class="title">
<h1>Обучение криптовалютам</h1>
<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>
</div>

<div class="grid" id="cards"></div>

<script>

const data=[
"Первая и самая известная криптовалюта",
"Система записи всех транзакций",
"Хранение криптовалют",
"Покупка и продажа крипты",
"Заработок на изменении цены",
"Никому не передавайте ключи",
"Создание новых монет",
"Цифровые деньги будущего"
];

const names=["Bitcoin","Блокчейн","Кошелёк","Биржа","Трейдинг","Безопасность","Майнинг","Криптовалюта"];
const icons=["₿","⛓","💳","🏛","📈","🔐","⛏","🪙"];

let opened=new Set(JSON.parse(localStorage.getItem("progress"))||[]);
const container=document.getElementById("cards");

names.forEach((name,i)=>{
  container.innerHTML+=`
  <div class="card ${opened.has(i)?'active':''}" onclick="toggle(this,${i})">
    <div class="card-inner">
      <div class="card-front">
        <div class="icon">${icons[i]}</div>
        ${name}
      </div>
      <div class="card-back">
        ${data[i]}
      </div>
    </div>
  </div>`;
});

function toggle(card,i){
 card.classList.toggle("active");
 if(card.classList.contains("active")){
   opened.add(i);
 } else {
   opened.delete(i);
 }
 localStorage.setItem("progress",JSON.stringify([...opened]));
 update();
}

function update(){
 let total=names.length;
 let percent=(opened.size/total)*100;
 document.getElementById("progressBar").style.width=percent+"%";
}

update();

</script>

</body>
</html>
