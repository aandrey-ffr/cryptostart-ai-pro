<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучение | CryptoStart</title>

<style>

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#020617,#1e293b,#0f172a,#1e1b4b,#1e3a8a);
  background-size:600% 600%;
  animation:gradientMove 12s ease infinite;
  overflow-x:hidden;
  position:relative;
}

/* WEB3 GRID */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size:70px 70px;
  pointer-events:none;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* NAVBAR */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.85);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav-links{
  display:flex;
  gap:20px;
}

.nav-links a{
  text-decoration:none;
  color:#cbd5e1;
  font-weight:500;
  transition:0.3s;
}

.nav-links a:hover{
  color:white;
}

/* TITLE */

.title{
  text-align:center;
  margin-top:40px;
}

h1{
  margin-bottom:20px;
}

/* PROGRESS */

.progress{
  width:300px;
  height:6px;
  margin:0 auto 60px auto;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  transition:0.4s;
}

/* GRID */

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
  max-width:900px;
  margin:0 auto;
}

/* CARD */

.card{
  width:200px;
  height:200px;
  perspective:1000px;
  cursor:pointer;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform 0.6s;
  transform-style:preserve-3d;
}

.card.active .card-inner{
  transform:rotateY(180deg);
}

.card-front,
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  background:rgba(30,41,59,0.8);
  border:1px solid rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  backface-visibility:hidden;
  box-sizing:border-box;
}

/* НЕОН */
.card:hover .card-front{
  box-shadow:
    0 0 15px rgba(56,189,248,0.6),
    0 0 40px rgba(139,92,246,0.6);
}

.card-back{
  transform:rotateY(180deg);
}

/* ICON */

.icon{
  font-size:40px;
  margin-bottom:10px;
}

/* COINS */

.coin{
  position:fixed;
  font-size:20px;
  opacity:0.12;
  animation:float 30s linear infinite;
  pointer-events:none;
}

@keyframes float{
  0%{transform:translateY(110vh);}
  100%{transform:translateY(-20vh);}
}

</style>
</head>

<body>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div class="nav-links">
    <a href="index.html">🏠 Главная</a>
    <a href="education.html">📚 Обучение</a>
    <a href="rates.html">💰 Курсы</a>
    <a href="ai.html">🤖 AI</a>
    <a href="about.html">🌐 О проекте</a>
  </div>
</nav>

<script>
const coins=["₿","Ξ","◈","◎","✦","✧"];
const count=window.innerWidth<768?10:20;

for(let i=0;i<count;i++){
  let c=document.createElement("div");
  c.className="coin";
  c.innerText=coins[Math.floor(Math.random()*coins.length)];
  c.style.left=Math.random()*100+"vw";
  c.style.animationDelay=Math.random()*20+"s";
  document.body.appendChild(c);
}
</script>

<div class="title">
<h1>Обучение криптовалютам</h1>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>
</div>

<div class="grid">
