<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучение | CryptoStart</title>

<style>

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#020617,#1e293b,#0f172a,#1e1b4b,#1e3a8a);
  background-size:600% 600%;
  animation:gradientMove 12s ease infinite;
  overflow-x:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Монеты */
.coin{
  position:fixed;
  font-size:32px;
  opacity:0.12;
  animation:float 25s linear infinite;
  pointer-events:none;
}

@keyframes float{
  0%{transform:translateY(110vh) rotate(0deg);}
  100%{transform:translateY(-20vh) rotate(360deg);}
}

nav{
  padding:20px;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

nav a{
  color:#cbd5e1;
  margin-left:20px;
  text-decoration:none;
}

nav a:hover{
  color:#38bdf8;
}

.container{
  padding:70px 30px;
  max-width:1200px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:60px;
}

/* ===== СЕТКА ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:30px;
}

.grid .card:nth-child(6){ grid-column:2; }
.grid .card:nth-child(7){ grid-column:3; }
.grid .card:nth-child(8){ grid-column:4; }

/* ===== КАРТОЧКИ ===== */
.card{
  perspective:1000px;
  height:220px;
  cursor:pointer;
  transition:0.3s ease;
}

.card:hover{
  transform:translateY(-6px);
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform 0.6s;
  transform-style:preserve-3d;
}

.card.active .card-inner{
  transform:rotateY(180deg);
}

.card-front,
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:18px;
  padding:25px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  box-sizing:border-box;
  background:rgba(30,41,59,0.85);
}

.card-back{
  transform:rotateY(180deg);
  font-size:14px;
}

.icon{
  font-size:40px;
  margin-bottom:15px;
}

/* ===== АДАПТИВ ===== */
@media(max-width:768px){
  .grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:500px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>
<body>

<!-- МНОГО ЛЕТАЮЩИХ МОНЕТ -->
<div class="coin" style="left:10%; animation-delay:0s;">₿</div>
<div class="coin" style="left:30%; animation-delay:6s;">Ξ</div>
<div class="coin" style="left:60%; animation-delay:12s;">₿</div>
<div class="coin" style="left:20%; animation-delay:2s;">Ξ</div>
<div class="coin" style="left:50%; animation-delay:8s;">₿</div>
<div class="coin" style="left:75%; animation-delay:14s;">Ξ</div>
<div class="coin" style="left:85%; animation-delay:5s;">₿</div>
<div class="coin" style="left:40%; animation-delay:10s;">Ξ</div>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div>
    <a href="index.html">Главная</a>
    <a href="rates.html">Курсы</a>
    <a href="ai.html">AI</a>
    <a href="about.html">О проекте</a>
  </div>
</nav>

<div class="container">
<h1>Обучение криптовалютам</h1>

<div class="grid">

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front"><div class="icon">₿</div>Bitcoin</div>
<div class="card-back">Первая и самая известная криптовалюта.</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front"><div class="icon">⛓</div>Блокчейн</div>
<div class="card-back">Система, где записываются все переводы.</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front"><div class="icon">💳</div>Кошелёк</div>
<div class="card-back">Программа для хранения криптомонет.</div>
</div></div>

<div class="card" onclick="toggleCard(this)">
<div class="card-inner">
<div class="card-front"><div class="icon">🏛</div>Биржа</div>
<div class="card-back">Платформа для покупки и продажи криптовалют.</div>
</div></div>

</div>

</div>

<script>
function toggleCard(card){
  card.classList.toggle("active");
}
</script>

</body>
</html>
