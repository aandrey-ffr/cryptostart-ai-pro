<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучение | CryptoStart AI</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(99,102,241,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(6,182,212,0.15), transparent 40%),
    #0f172a;
  color:white;
  padding:100px 40px 60px 40px;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
}

nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{
  color:#38bdf8;
}

h1{
  text-align:center;
  margin-bottom:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

/* CARD */
.card{
  perspective:1000px;
  cursor:pointer;
}

.card-inner{
  position:relative;
  width:100%;
  height:260px;
  transform-style:preserve-3d;
  transition:transform 0.6s;
}

.card.active .card-inner{
  transform:rotateY(180deg);
}

.card-front,
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  background:rgba(30,41,59,0.85);
  border-radius:18px;
  padding:20px;
  box-sizing:border-box;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.card-back{
  transform:rotateY(180deg);
  font-size:13px;
  line-height:1.5;
  overflow:auto;
}

.card.active .card-front,
.card.active .card-back{
  box-shadow:0 0 30px rgba(99,102,241,0.6);
}

/* ARROW */
.arrow{
  margin-top:10px;
  transition:0.4s;
}

.card.active .arrow{
  transform:rotate(180deg);
}

/* PROGRESS */
.progress{
  margin-top:40px;
  height:10px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#06b6d4,#6366f1);
  transition:0.5s;
}

.reset-btn{
  margin-top:15px;
  padding:8px 15px;
  border:none;
  border-radius:8px;
  background:#334155;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div>
    <a href="index.html">Главная</a>
    <a href="rates.html">Курсы</a>
    <a href="ai.html">AI</a>
    <a href="about.html">О проекте</a>
  </div>
</nav>

<h1>Обучение криптовалютам</h1>

<div class="grid" id="courseGrid"></div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button class="reset-btn" onclick="resetProgress()">Сбросить прогресс</button>

<script>
const courses = [

{ icon:"🪙", title:"Криптовалюта",
text:"Цифровой актив на блокчейне. Децентрализация, прозрачность, высокая волатильность. Используется для переводов и инвестиций." },

{ icon:"⛓️", title:"Блокчейн",
text:"Распределённая база данных. Каждый блок связан с предыдущим. Практически невозможно изменить историю транзакций." },

{ icon:"₿", title:"Bitcoin",
text:"Первая криптовалюта (2009). Ограничение 21 млн монет. Создан для независимой финансовой системы." },

{ icon:"💳", title:"Кошельки",
text:"Горячие и холодные. Seed-фраза 12–24 слова. Никогда не передавайте её никому." },

{ icon:"🏦", title:"Биржи",
text:"Платформы для торговли. Централизованные и децентрализованные. Возможны риски блокировки." },

{ icon:"📈", title:"Трейдинг",
text:"Активная торговля. Стратегии: скальпинг, свинг, дневная торговля. Обязателен риск-менеджмент." },

{ icon:"💼", title:"Инвестирование",
text:"Долгосрочное удержание (HODL). Анализ проекта, команды и токеномики." },

{ icon:"🌍", title:"DeFi",
text:"Финансовые сервисы без банков. Стейкинг, лендинг, фарминг. Есть риски смарт-контрактов." },

{ icon:"🖼️", title:"NFT",
text:"Невзаимозаменяемые токены. Используются в играх, искусстве и метавселенных." },

{ icon:"⚡", title:"Layer 2",
text:"Решения для ускорения транзакций и снижения комиссий. Примеры: Arbitrum, Optimism." },

{ icon:"🔐", title:"Безопасность",
text:"Фишинг, скам, поддельные сайты. Используйте 2FA и аппаратные кошельки." }

];

const grid = document.getElementById("courseGrid");
const progressBar = document.getElementById("progressBar");

let completed = JSON.parse(localStorage.getItem("progress")) || 0;
updateProgress();

courses.forEach(course=>{
  const card = document.createElement("div");
  card.className="card";

  card.innerHTML=`
    <div class="card-inner">
      <div class="card-front">
        <div style="font-size:40px">${course.icon}</div>
        <h3>${course.title}</h3>
        <div class="arrow">▼</div>
      </div>
      <div class="card-back">
        <h3>${course.title}</h3>
        <p>${course.text}</p>
      </div>
    </div>
  `;

  card.onclick=()=>{
    document.querySelectorAll(".card").forEach(c=>{
      if(c!==card) c.classList.remove("active");
    });

    card.classList.toggle("active");

    if(!card.dataset.opened){
      completed++;
      card.dataset.opened = true;
      localStorage.setItem("progress", completed);
      updateProgress();
    }
  };

  grid.appendChild(card);
});

function updateProgress(){
  let percent = Math.min((completed / courses.length) * 100,100);
  progressBar.style.width = percent + "%";
}

function resetProgress(){
  completed = 0;
  localStorage.removeItem("progress");
  progressBar.style.width = "0%";
}
</script>

</body>
</html>
