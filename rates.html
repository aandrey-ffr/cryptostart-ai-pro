<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Курсы | CryptoStart</title>

<style>

/* ===== ФОН ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#1e1b4b);
  background-size:400% 400%;
  animation:gradientMove 18s ease infinite;
  overflow:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== НАВБАР ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.85);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
  position:relative;
  z-index:10;
}

nav a{
  color:#cbd5e1;
  margin-left:20px;
  text-decoration:none;
  position:relative;
  padding-bottom:4px;
  transition:0.3s;
}

nav a:hover{ color:#38bdf8; }

nav a.active{
  color:#38bdf8;
}

nav a.active::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
}

/* ===== КОНТЕНТ ===== */

.container{
  text-align:center;
  margin-top:80px;
  position:relative;
  z-index:5;
}

.table-wrapper{
  display:inline-block;
  background:rgba(30,41,59,0.9);
  padding:30px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 0 40px rgba(139,92,246,0.25);
}

table{
  border-collapse:collapse;
  min-width:320px;
}

th, td{
  padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

th{ color:#38bdf8; }

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #8b5cf6;
}

/* ===== НЕРВНАЯ РЫНОЧНАЯ СТРЕЛКА ===== */

.market-container{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  overflow:hidden;
  z-index:0;
  opacity:0.08;
}

.market-svg{
  width:1400px;
  position:absolute;
  bottom:50px;
  left:-300px;
  animation:slide 20s linear infinite;
}

.market-path{
  fill:none;
  stroke:#ef4444;
  stroke-width:10;
  stroke-linejoin:round;
  stroke-linecap:round;
  filter:drop-shadow(0 0 15px #ef4444);
  animation:shake 1.8s infinite ease-in-out;
}

/* движение слева направо */
@keyframes slide{
  0%{transform:translateX(0);}
  100%{transform:translateX(400px);}
}

/* нестабильный быстрый отскок */
@keyframes shake{
  0%{transform:translateY(0);}
  15%{transform:translateY(-15px);}
  30%{transform:translateY(20px);}
  45%{transform:translateY(-25px);}
  60%{transform:translateY(15px);}
  75%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

</style>
</head>
<body>

<!-- Фон рынка -->
<div class="market-container">
  <svg class="market-svg" viewBox="0 0 1200 400">
    <path class="market-path"
      d="M0 300 
         L150 200 
         L250 260 
         L400 150 
         L520 220 
         L700 100 
         L850 180 
         L1050 60"
    />
  </svg>
</div>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div>
    <a href="index.html">Главная</a>
    <a href="education.html">Обучение</a>
    <a href="rates.html" class="active">Курсы</a>
    <a href="ai.html">AI</a>
    <a href="about.html">О проекте</a>
  </div>
</nav>

<div class="container">
<h1>Курсы криптовалют</h1>

<div class="table-wrapper">
<table>
<tr><th>Валюта</th><th>USD</th></tr>
<tr><td>Bitcoin</td><td id="btc">—</td></tr>
<tr><td>Ethereum</td><td id="eth">—</td></tr>
<tr><td>USDT</td><td id="usdt">—</td></tr>
<tr><td>BNB</td><td id="bnb">—</td></tr>
<tr><td>Solana</td><td id="sol">—</td></tr>
<tr><td>XRP</td><td id="xrp">—</td></tr>
</table>

<button onclick="loadPrices()">Обновить</button>
</div>

</div>

<script>

async function loadPrices(){
  try{
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,binancecoin,solana,ripple&vs_currencies=usd");
    const data = await res.json();

    btc.innerText = data.bitcoin.usd;
    eth.innerText = data.ethereum.usd;
    usdt.innerText = data.tether.usd;
    bnb.innerText = data.binancecoin.usd;
    sol.innerText = data.solana.usd;
    xrp.innerText = data.ripple.usd;

  }catch{
    alert("Ошибка загрузки цен");
  }
}

loadPrices();

</script>

</body>
</html>
