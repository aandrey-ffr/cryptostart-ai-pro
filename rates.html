<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Курсы | CryptoStart AI</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg,#0f172a,#1e293b,#020617,#0f172a);
  background-size:400% 400%;
  animation:gradient 15s ease infinite;
  color:white;
  padding-top:80px;
  margin:0;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
}

nav a{
  color:white;
  margin-left:15px;
  text-decoration:none;
}

section{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

h1{
  font-size:40px;
  margin-bottom:30px;
}

table{
  margin:auto;
  border-collapse:collapse;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  overflow:hidden;
}

th, td{
  padding:15px 30px;
  border:1px solid rgba(255,255,255,0.2);
}

th{
  background:#1e293b;
}

.refresh{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#06b6d4;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <div><b>CryptoStart AI 🚀</b></div>
  <div>
    <a href="index.html">Главная</a>
    <a href="education.html">Обучение</a>
    <a href="rates.html">Курсы</a>
    <a href="ai.html">AI</a>
    <a href="about.html">О проекте</a>
  </div>
</nav>

<section>
  <h1>Курсы криптовалют</h1>

  <table>
    <tr>
      <th>Валюта</th>
      <th>USD</th>
    </tr>
    <tr>
      <td>Bitcoin</td>
      <td id="btc">Загрузка...</td>
    </tr>
    <tr>
      <td>Ethereum</td>
      <td id="eth">Загрузка...</td>
    </tr>
    <tr>
      <td>USDT</td>
      <td id="usdt">Загрузка...</td>
    </tr>
  </table>

  <button class="refresh" onclick="loadPrices()">Обновить</button>
</section>

<script>
async function loadPrices(){
  try{
    const response = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether&vs_currencies=usd");
    const data = await response.json();

    document.getElementById("btc").innerText = data.bitcoin.usd;
    document.getElementById("eth").innerText = data.ethereum.usd;
    document.getElementById("usdt").innerText = data.tether.usd;

  } catch(error){
    document.getElementById("btc").innerText = "Ошибка";
    document.getElementById("eth").innerText = "Ошибка";
    document.getElementById("usdt").innerText = "Ошибка";
  }
}

loadPrices();
</script>

</body>
</html>
