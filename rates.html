<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Курсы | CryptoStart</title>

<style>

/* ===== ОСНОВНОЙ ФОН ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:#0b1220;
  overflow-x:hidden;
}

/* ===== НАВБАР ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  position:relative;
  z-index:10;
}

nav a{
  color:#94a3b8;
  margin-left:20px;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{ color:#22c55e; }

nav a.active{
  color:#22c55e;
}

/* ===== КОНТЕНТ ===== */

.container{
  text-align:center;
  margin-top:80px;
  position:relative;
  z-index:5;
}

.table-wrapper{
  display:inline-block;
  background:rgba(17,24,39,0.95);
  padding:30px;
  border-radius:18px;
  border:1px solid rgba(34,197,94,0.3);
  box-shadow:
    0 0 20px rgba(34,197,94,0.4),
    0 0 50px rgba(34,197,94,0.2);
}

table{
  border-collapse:collapse;
  min-width:320px;
}

th, td{
  padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

th{ color:#22c55e; }

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:black;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#16a34a;
  box-shadow:0 0 15px #22c55e;
}

/* ===== FUTURES CANDLE BACKGROUND ===== */

.candles{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  overflow:hidden;
  z-index:0;
  opacity:0.2;
}

.candle{
  position:absolute;
  width:14px;
  border-radius:3px;
  animation:floatUp linear infinite;
}

/* фитиль */
.candle::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:2px;
  background:inherit;
  top:-20px;
  bottom:-20px;
}

/* движение вверх */
@keyframes floatUp{
  0%{
    transform:translateY(100vh);
    opacity:0;
  }
  10%{
    opacity:1;
  }
  100%{
    transform:translateY(-120vh);
    opacity:0;
  }
}

@media(max-width:768px){

  nav{
    flex-direction:column;
    gap:10px;
  }

  .container{
    margin-top:40px;
    padding:0 15px;
  }

  .table-wrapper{
    width:100%;
    overflow-x:auto;
  }

  table{
    width:100%;
  }
}

</style>
</head>
<body>

<!-- CANDLE BACKGROUND -->
<div class="candles"></div>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div>
    <a href="index.html">🏠Главная</a>
    <a href="education.html">📚Обучение</a>
    <a href="ai.html">🤖AI</a>
    <a href="about.html">📘О проекте</a>
  </div>
</nav>

<div class="container">
<h1>Курсы криптовалют📊</h1>

<div class="table-wrapper">
<table>
<tr><th>Валюта</th><th>USD</th></tr>
<tr><td>Bitcoin</td><td id="btc">—</td></tr>
<tr><td>Ethereum</td><td id="eth">—</td></tr>
<tr><td>USDT</td><td id="usdt">—</td></tr>
<tr><td>BNB</td><td id="bnb">—</td></tr>
<tr><td>Solana</td><td id="sol">—</td></tr>
<tr><td>XRP</td><td id="xrp">—</td></tr>
</table>

<button onclick="loadPrices()">Обновить</button>
</div>
</div>

<script>

/* ===== ГЕНЕРАЦИЯ СВЕЧЕЙ ===== */

const container = document.querySelector(".candles");

function createCandle(){
  const candle = document.createElement("div");
  candle.classList.add("candle");

  const height = Math.random() * 100 + 40;
  const left = Math.random() * 100;
  const duration = Math.random() * 10 + 10;
  const isGreen = Math.random() > 0.5;

  candle.style.height = height + "px";
  candle.style.left = left + "vw";
  candle.style.background = isGreen ? "#22c55e" : "#ef4444";
  candle.style.animationDuration = duration + "s";

  container.appendChild(candle);

  setTimeout(() => {
    candle.remove();
  }, duration * 1000);
}

/* каждые 700мс новая свеча */
setInterval(createCandle, 700);


/* ===== ЗАГРУЗКА ЦЕН ===== */

async function loadPrices(){
  try{
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,binancecoin,solana,ripple&vs_currencies=usd");
    const data = await res.json();

    btc.innerText = data.bitcoin.usd;
    eth.innerText = data.ethereum.usd;
    usdt.innerText = data.tether.usd;
    bnb.innerText = data.binancecoin.usd;
    sol.innerText = data.solana.usd;
    xrp.innerText = data.ripple.usd;

  }catch{
    alert("Ошибка загрузки цен");
  }
}

loadPrices();

</script>

</body>
</html>
