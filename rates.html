<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Курсы | CryptoStart</title>

<style>

/* ===== ЖИВОЙ ГРАДИЕНТ ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#1e1b4b);
  background-size:400% 400%;
  animation:gradientMove 18s ease infinite;
  overflow:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== НАВБАР ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.85);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
  position:relative;
  z-index:10;
}

nav a{
  color:#cbd5e1;
  margin-left:20px;
  text-decoration:none;
  position:relative;
  padding-bottom:4px;
  transition:0.3s;
}

nav a:hover{
  color:#38bdf8;
}

nav a.active{
  color:#38bdf8;
}

nav a.active::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
}

/* ===== КОНТЕНТ ===== */

.container{
  text-align:center;
  margin-top:80px;
  position:relative;
  z-index:5;
}

.table-wrapper{
  display:inline-block;
  background:rgba(30,41,59,0.85);
  padding:30px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 0 40px rgba(139,92,246,0.2);
}

table{
  border-collapse:collapse;
  min-width:320px;
}

th, td{
  padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

th{
  color:#38bdf8;
}

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #8b5cf6;
}

/* ===== ЖИВЫЕ СТРЕЛКИ РЫНКА ===== */

.market-arrow{
  position:absolute;
  width:200px;
  height:2px;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  opacity:0.07;
  border-radius:4px;
}

.market-arrow::after{
  content:"";
  position:absolute;
  right:-6px;
  top:-4px;
  border-left:8px solid #22c55e;
  border-top:5px solid transparent;
  border-bottom:5px solid transparent;
}

/* ПАТТЕРНЫ ДВИЖЕНИЯ */

@keyframes wave1{
  0%{transform:translateY(300px) rotate(20deg);}
  40%{transform:translateY(-50px) rotate(-10deg);}
  70%{transform:translateY(100px) rotate(15deg);}
  100%{transform:translateY(-400px) rotate(25deg);}
}

@keyframes wave2{
  0%{transform:translateY(-200px) rotate(-20deg);}
  50%{transform:translateY(150px) rotate(20deg);}
  100%{transform:translateY(-300px) rotate(-30deg);}
}

@keyframes wave3{
  0%{transform:translateY(250px) rotate(10deg);}
  60%{transform:translateY(-150px) rotate(-15deg);}
  100%{transform:translateY(300px) rotate(20deg);}
}

@keyframes wave4{
  0%{transform:translateY(-150px) rotate(30deg);}
  50%{transform:translateY(200px) rotate(-20deg);}
  100%{transform:translateY(-250px) rotate(30deg);}
}

@keyframes wave5{
  0%{transform:translateY(200px) rotate(-15deg);}
  50%{transform:translateY(-200px) rotate(20deg);}
  100%{transform:translateY(200px) rotate(-15deg);}
}

/* Разные позиции */

.a1{ left:5%; top:60%; animation:wave1 22s infinite linear; }
.a2{ left:25%; top:20%; animation:wave2 26s infinite linear; }
.a3{ left:45%; top:75%; animation:wave3 24s infinite linear; }
.a4{ left:65%; top:35%; animation:wave4 28s infinite linear; }
.a5{ left:80%; top:10%; animation:wave5 30s infinite linear; }

</style>
</head>
<body>

<!-- Фоновые стрелки -->
<div class="market-arrow a1"></div>
<div class="market-arrow a2"></div>
<div class="market-arrow a3"></div>
<div class="market-arrow a4"></div>
<div class="market-arrow a5"></div>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div>
    <a href="index.html">Главная</a>
    <a href="education.html">Обучение</a>
    <a href="rates.html" class="active">Курсы</a>
    <a href="ai.html">AI</a>
    <a href="about.html">О проекте</a>
  </div>
</nav>

<div class="container">
<h1>Курсы криптовалют</h1>

<div class="table-wrapper">
<table>
<tr><th>Валюта</th><th>USD</th></tr>
<tr><td>Bitcoin</td><td id="btc">—</td></tr>
<tr><td>Ethereum</td><td id="eth">—</td></tr>
<tr><td>USDT</td><td id="usdt">—</td></tr>
<tr><td>BNB</td><td id="bnb">—</td></tr>
<tr><td>Solana</td><td id="sol">—</td></tr>
<tr><td>XRP</td><td id="xrp">—</td></tr>
</table>

<button onclick="loadPrices()">Обновить</button>
</div>

</div>

<script>

async function loadPrices(){
  try{
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,binancecoin,solana,ripple&vs_currencies=usd");
    const data = await res.json();

    btc.innerText = data.bitcoin.usd;
    eth.innerText = data.ethereum.usd;
    usdt.innerText = data.tether.usd;
    bnb.innerText = data.binancecoin.usd;
    sol.innerText = data.solana.usd;
    xrp.innerText = data.ripple.usd;

  }catch{
    alert("Ошибка загрузки цен");
  }
}

loadPrices();

</script>

</body>
</html>
