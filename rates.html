<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Курсы | CryptoStart</title>

<style>

/* ===== ЖИВОЙ ФОН ===== */
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#1e1b4b);
  background-size:400% 400%;
  animation:gradientMove 18s ease infinite;
  overflow:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== АНИМАЦИЯ РЫНОЧНЫХ ЛИНИЙ ===== */
.market-line{
  position:absolute;
  width:600px;
  height:200px;
  border-left:2px solid transparent;
  border-bottom:2px solid #38bdf8;
  transform:rotate(-20deg);
  opacity:0.15;
  animation:rise 12s linear infinite;
}

.market-line.red{
  border-bottom:2px solid #ef4444;
  animation:fall 14s linear infinite;
}

@keyframes rise{
  0%{transform:translateY(200px) rotate(-20deg);}
  100%{transform:translateY(-400px) rotate(-20deg);}
}

@keyframes fall{
  0%{transform:translateY(-200px) rotate(20deg);}
  100%{transform:translateY(400px) rotate(20deg);}
}

/* ===== НАВБАР ===== */
nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.95);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
  position:relative;
  z-index:10;
}

nav a{
  color:#cbd5e1;
  margin-left:20px;
  text-decoration:none;
  position:relative;
  padding-bottom:5px;
}

/* Активная вкладка */
nav a.active{
  color:#38bdf8;
}

nav a.active::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
}

/* ===== КОНТЕЙНЕР ===== */
.container{
  text-align:center;
  margin-top:80px;
  position:relative;
  z-index:5;
}

h1{
  margin-bottom:40px;
}

/* ===== ТАБЛИЦА ===== */
.table-wrapper{
  display:inline-block;
  background:rgba(30,41,59,0.85);
  padding:25px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 0 30px rgba(139,92,246,0.2);
}

table{
  border-collapse:collapse;
  min-width:300px;
}

th, td{
  padding:12px 20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
  color:#38bdf8;
}

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#38bdf8,#8b5cf6);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #8b5cf6;
}

</style>
</head>
<body>

<!-- Фоновые рыночные линии -->
<div class="market-line" style="left:-100px; top:200px;"></div>
<div class="market-line red" style="right:-150px; top:300px;"></div>
<div class="market-line" style="left:200px; top:500px;"></div>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div>
    <a href="index.html">Главная</a>
    <a href="education.html">Обучение</a>
    <a href="rates.html" class="active">Курсы</a>
    <a href="ai.html">AI</a>
    <a href="about.html">О проекте</a>
  </div>
</nav>

<div class="container">
<h1>Курсы криптовалют</h1>

<div class="table-wrapper">
<table>
<tr><th>Валюта</th><th>USD</th></tr>
<tr><td>Bitcoin</td><td id="btc">—</td></tr>
<tr><td>Ethereum</td><td id="eth">—</td></tr>
<tr><td>USDT</td><td id="usdt">—</td></tr>
<tr><td>BNB</td><td id="bnb">—</td></tr>
<tr><td>Solana</td><td id="sol">—</td></tr>
<tr><td>XRP</td><td id="xrp">—</td></tr>
</table>

<button onclick="loadPrices()">Обновить</button>
</div>

</div>

<script>

async function loadPrices(){
  try{
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,binancecoin,solana,ripple&vs_currencies=usd");
    const data = await res.json();

    document.getElementById("btc").innerText = data.bitcoin.usd;
    document.getElementById("eth").innerText = data.ethereum.usd;
    document.getElementById("usdt").innerText = data.tether.usd;
    document.getElementById("bnb").innerText = data.binancecoin.usd;
    document.getElementById("sol").innerText = data.solana.usd;
    document.getElementById("xrp").innerText = data.ripple.usd;

  }catch{
    alert("Ошибка загрузки цен");
  }
}

loadPrices();

</script>

</body>
</html>
