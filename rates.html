<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Курсы | CryptoStart</title>

<style>

/* ===== ОСНОВНОЙ ФОН ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:white;
  background:#0f172a;
  overflow:hidden;
}

/* ===== НАВБАР ===== */

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  position:relative;
  z-index:10;
}

nav a{
  color:#94a3b8;
  margin-left:20px;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{ color:#22c55e; }

nav a.active{
  color:#22c55e;
}

/* ===== КОНТЕНТ ===== */

.container{
  text-align:center;
  margin-top:80px;
  position:relative;
  z-index:5;
}

.table-wrapper{
  display:inline-block;
  background:rgba(30,41,59,0.95);
  padding:30px;
  border-radius:18px;
  box-shadow:0 0 40px rgba(0,0,0,0.4);
}

table{
  border-collapse:collapse;
  min-width:320px;
}

th, td{
  padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

th{ color:#22c55e; }

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:black;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#16a34a;
}

/* ===== TRADING BACKGROUND ===== */

.chart-container{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:0;
  opacity:0.12;
}

.chart{
  position:absolute;
  width:1200px;
  height:400px;
  bottom:0;
  animation:move 25s linear infinite;
}

.chart path{
  fill:none;
  stroke:#22c55e;
  stroke-width:4;
  stroke-linecap:round;
  stroke-linejoin:round;
  filter:drop-shadow(0 0 8px #22c55e);
  animation:volatility 2s infinite ease-in-out;
}

/* Движение графика */
@keyframes move{
  0%{ transform:translateX(-200px); }
  100%{ transform:translateX(300px); }
}

/* Быстрые отскоки */
@keyframes volatility{
  0%{ transform:translateY(0); }
  25%{ transform:translateY(-8px); }
  50%{ transform:translateY(12px); }
  75%{ transform:translateY(-6px); }
  100%{ transform:translateY(0); }
}

</style>
</head>
<body>

<!-- TRADING BACKGROUND -->
<div class="chart-container">

<svg class="chart" viewBox="0 0 1200 400">
<path d="
M0 320 
L100 260 
L180 300 
L260 200 
L340 230 
L420 160 
L520 210 
L600 130 
L700 180 
L820 100 
L950 150 
L1100 60
"/>
</svg>

<svg class="chart" style="animation-duration:35s; opacity:0.6;" viewBox="0 0 1200 400">
<path d="
M0 350 
L120 290 
L220 330 
L300 250 
L380 280 
L480 190 
L580 240 
L650 170 
L760 210 
L900 140 
L1050 190 
L1180 110
"/>
</svg>

</div>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div>
    <a href="index.html">Главная</a>
    <a href="education.html">Обучение</a>
    <a href="rates.html" class="active">Курсы</a>
    <a href="ai.html">AI</a>
    <a href="about.html">О проекте</a>
  </div>
</nav>

<div class="container">
<h1>Курсы криптовалют</h1>

<div class="table-wrapper">
<table>
<tr><th>Валюта</th><th>USD</th></tr>
<tr><td>Bitcoin</td><td id="btc">—</td></tr>
<tr><td>Ethereum</td><td id="eth">—</td></tr>
<tr><td>USDT</td><td id="usdt">—</td></tr>
<tr><td>BNB</td><td id="bnb">—</td></tr>
<tr><td>Solana</td><td id="sol">—</td></tr>
<tr><td>XRP</td><td id="xrp">—</td></tr>
</table>

<button onclick="loadPrices()">Обновить</button>
</div>
</div>

<script>
async function loadPrices(){
  try{
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,binancecoin,solana,ripple&vs_currencies=usd");
    const data = await res.json();

    btc.innerText = data.bitcoin.usd;
    eth.innerText = data.ethereum.usd;
    usdt.innerText = data.tether.usd;
    bnb.innerText = data.binancecoin.usd;
    sol.innerText = data.solana.usd;
    xrp.innerText = data.ripple.usd;
  }catch{
    alert("Ошибка загрузки цен");
  }
}
loadPrices();
</script>

</body>
</html>
