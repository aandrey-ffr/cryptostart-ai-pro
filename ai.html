body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#1e1b4b);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
  color:white;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

nav{
  padding:20px 40px;
  background:rgba(15,23,42,0.9);
  display:flex;
  justify-content:space-between;
}

nav a{
  color:#cbd5e1;
  margin-left:20px;
  text-decoration:none;
}

nav a:hover{
  color:#38bdf8;
}

.container{
  display:grid;
  grid-template-columns:250px 1fr 250px;
  gap:20px;
  padding:40px;
}

/* SIDE PANELS */
.side{
  background:rgba(30,41,59,0.8);
  border-radius:20px;
  padding:20px;
  height:75vh;
  overflow:auto;
}

.market-card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.market-card h4{
  margin:0;
}

.price{
  font-size:18px;
  margin-top:5px;
}

/* CHAT */
.chat{
  background:rgba(30,41,59,0.85);
  border-radius:20px;
  padding:20px;
  display:flex;
  flex-direction:column;
  height:75vh;
}

.messages{
  flex:1;
  overflow:auto;
}

.message{
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
}

.user{
  background:#6366f1;
  align-self:flex-end;
}

.bot{
  background:#334155;
}

.input-area{
  display:flex;
  gap:10px;
  margin-top:15px;
}

input{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#06b6d4;
  color:white;
  cursor:pointer;
}

.quick-btn{
  display:block;
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#334155;
  border:none;
  border-radius:10px;
  color:white;

.quick-btn:hover{
  background:#475569;

/* ===== MOBILE ADAPT (AI PAGE) ===== */

  /* Общий контейнер */

    display:flex;

    padding:20px 15px;

  /* Боковые панели */
  .side{

  }

  /* Чат */

  /* Сообщения */

  /* Поле ввода */

  button{

  }

  /* Навбар */

    align-items:center;
    gap:10px;

    padding:15px;

  nav div:last-child{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;

  }

  nav a{

<body>

<nav>
  <div><b>🚀 CryptoStart AI</b></div>
  <div>
    <a href="index.html">🏠Главная</a>
    <a href="education.html">📚Обучение</a>
    <a href="rates.html">📈Курсы</a>
    <a href="about.html">📖О проекте</a>
  </div>
</nav>

<div class="container">

  <!-- LEFT MARKET -->
  <div class="side">
    <h3>📊 Рынок</h3>
    <div id="market"></div>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input id="input" placeholder="Введите вопрос..." />
      <button onclick="sendMessage()">Спросить</button>
    </div>
  </div>

  <!-- RIGHT QUICK QUESTIONS -->
  <div class="side">
    <h3>⚡ Быстрые вопросы</h3>
    <button class="quick-btn" onclick="quickAsk('Объясни Bitcoin простыми словами')">Что такое Bitcoin?</button>
    <button class="quick-btn" onclick="quickAsk('Что такое DeFi?')">Что такое DeFi?</button>
    <button class="quick-btn" onclick="quickAsk('Стоит ли инвестировать в крипту?')">Стоит ли инвестировать?</button>
    <button class="quick-btn" onclick="quickAsk('Какие риски в криптовалюте?')">Риски крипты</button>
  </div>

</div>

<script>
// ===== MARKET DATA =====
async function loadMarket(){
  const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether&vs_currencies=usd");
  const data = await res.json();

  document.getElementById("market").innerHTML = `
    <div class="market-card">
      <h4>Bitcoin</h4>
      <div class="price">$${data.bitcoin.usd}</div>
    </div>
    <div class="market-card">
      <h4>Ethereum</h4>
      <div class="price">$${data.ethereum.usd}</div>
    </div>
    <div class="market-card">
      <h4>USDT</h4>
      <div class="price">$${data.tether.usd}</div>
    </div>
  `;
}

loadMarket();
setInterval(loadMarket,30000);

// ===== CHAT =====
function addMessage(text,type){
  const msg=document.createElement("div");
  msg.className="message "+type;
  msg.innerText=text;
  document.getElementById("messages").appendChild(msg);
}

async function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  const data=await res.json();
  addMessage(data.reply,"bot");
}

function quickAsk(question){
  document.getElementById("input").value=question;
  sendMessage();
}
</script>

</body>
